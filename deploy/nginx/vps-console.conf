# NGINX TLS reverse proxy for the VPS Management Console.
#
# The console's own backend binds to 127.0.0.1:<APP_PORT> only (see
# backend/.env HOST/PORT) — it is never reachable directly. This vhost is
# what actually exposes it, and password+TOTP+JWT (not network position) is
# the real security boundary, so it's safe to expose on the public interface
# if you want occasional access from outside your WireGuard tunnel. Pair this
# with fail2ban (see README) and keep the rate limits in the app enabled.
#
# Install (two-phase — certbot needs a working plain-HTTP vhost to issue
# against before any TLS config can reference a certificate that exists):
#   1. cp deploy/nginx/vps-console.conf /etc/nginx/sites-available/vps-console
#      sed -i 's/console.example.com/<your-domain>/g' /etc/nginx/sites-available/vps-console
#      ln -s /etc/nginx/sites-available/vps-console /etc/nginx/sites-enabled/
#      nginx -t && systemctl reload nginx
#   2. certbot --nginx -d <your-domain>
#      This finds the server block below, issues the cert, duplicates the
#      block onto a new "listen 443 ssl" server (keeping the same
#      proxy_pass location), and offers to add the http->https redirect —
#      say yes. Don't hand-write the 443 block yourself; certbot's job.
#
# Replace console.example.com below to match your domain.

server {
    listen 80;
    listen [::]:80;
    server_name console.example.com;

    client_max_body_size 100m;  # matches backend/src/fileTransfer/routes.js MAX_UPLOAD_BYTES

    location / {
        proxy_pass http://127.0.0.1:6000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/vps-console.access.log;
    error_log /var/log/nginx/vps-console.error.log;
}

# After step 2 above, certbot will have appended a second server block here
# looking approximately like this (auto-generated — don't maintain by hand;
# `certbot renew` keeps the certificate paths current):
#
# server {
#     listen 443 ssl http2;         # or "ssl; http2 on;" on NGINX >=1.25.1
#     listen [::]:443 ssl http2;
#     server_name console.example.com;
#     client_max_body_size 100m;
#     location / { ...same proxy_pass block as above... }
#     ssl_certificate     /etc/letsencrypt/live/console.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/console.example.com/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
# }

# --- Alternative: restrict to a WireGuard tunnel interface only ---
# For a more locked-down setup, once certbot has issued the cert, edit the
# 443 block's `listen` lines to bind only the VPS's WireGuard interface
# address instead of all interfaces, and delete the plaintext :80 server
# block entirely (no public listener at all). Replace 10.8.0.1 with your
# actual wg0 address from `wg show` / `ip addr show wg0`:
#
#   listen 10.8.0.1:443 ssl http2;
#
# Combine with `ufw deny 443/tcp` on the public interface (see README) so the
# port simply isn't reachable except through the tunnel.
