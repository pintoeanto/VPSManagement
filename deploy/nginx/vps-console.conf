# NGINX TLS reverse proxy for the VPS Management Console.
#
# The console's own backend binds to 127.0.0.1:<APP_PORT> only (see
# backend/.env HOST/PORT) — it is never reachable directly. This vhost is
# what actually exposes it, and password+TOTP+JWT (not network position) is
# the real security boundary, so it's safe to expose on the public interface
# if you want occasional access from outside your WireGuard tunnel. Pair this
# with fail2ban (see README) and keep the rate limits in the app enabled.
#
# Install:
#   cp deploy/nginx/vps-console.conf /etc/nginx/sites-available/vps-console
#   ln -s /etc/nginx/sites-available/vps-console /etc/nginx/sites-enabled/
#   certbot --nginx -d console.example.com
#   nginx -t && systemctl reload nginx
#
# Replace console.example.com and the APP_PORT below to match your setup.

server {
    listen 80;
    listen [::]:80;
    server_name console.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name console.example.com;

    # Managed by certbot --nginx (see Install above). Placeholders until then.
    ssl_certificate     /etc/letsencrypt/live/console.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/console.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;  # matches backend/src/fileTransfer/routes.js MAX_UPLOAD_BYTES

    location / {
        proxy_pass http://127.0.0.1:6000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/vps-console.access.log;
    error_log /var/log/nginx/vps-console.error.log;
}

# --- Alternative: restrict to the WireGuard tunnel interface only ---
# For a more locked-down setup, bind the TLS listener to the VPS's WireGuard
# interface address instead of all interfaces, and drop the plaintext :80
# server block entirely (no public listener at all). Replace 10.8.0.1 with
# your actual wg0 address from `wg-guard.status` / `ip addr show wg0`:
#
#   listen 10.8.0.1:443 ssl;
#   listen 10.8.0.1:80;   # only if you still want the http->https redirect internally
#
# Combine with `ufw deny 443/tcp` on the public interface (see README) so the
# port simply isn't reachable except through the tunnel.
